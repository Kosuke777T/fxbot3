active_account: demo
accounts:
  demo:
    server: ''
    login: 0
    password: ''
    type: demo
  real:
    server: ''
    login: 0
    password: ''
    type: real
data:
  base_timeframe: M5
  higher_timeframes:
  - M15
  - H1
  - H4
  - D1
  bars_count: 10000
  cache_dir: data/ohlcv
trading:
  max_positions: 3
  prediction_horizon: 6
  min_prediction_threshold: 0.0002
  max_lot: 0.07
  min_lot: 0.01
  min_confidence: 0.0
  active_symbols:
  - EURJPY-
  - EURUSD-
  - USDJPY-
risk:
  max_risk_per_trade: 0.02
  atr_sl_multiplier: 2.0
  atr_tp_multiplier: 2.0
  trailing_atr_multiplier: 1.0
  trailing_activation_atr: 2.0
  trailing_update_interval: 60
  trailing_sl_enabled: true
  trailing_tp_enabled: false
model:
  lgbm_params:
    objective: regression
    metric: mae
    boosting_type: gbdt
    num_leaves: 63
    learning_rate: 0.05
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    verbose: -1
  num_boost_round: 1000
  early_stopping_rounds: 50
  shap_top_pct: 0.5
  model_dir: data/models
  mode: regression
backtest:
  train_window_days: 180
  test_window_days: 30
  initial_balance: 1000000
  spread_pips: 1.5
retraining:
  enabled: true
  interval_hours: 168
  monitor_window: 20
  min_win_rate: 0.4
  min_sharpe: 0.0
  weekend_only: true
  run_wfo_before_train: true
  wfo_min_win_rate: 0.45
  wfo_min_sharpe: 0.3
logging:
  level: INFO
  file: data/fxbot.log
  max_bytes: 10485760
  backup_count: 3
trade_logging:
  enabled: true
  db_path: data/trades.db
market_filter:
  enabled: true
  use_adx_filter: true
  min_adx: 25.0
  use_spread_filter: true
  max_spread_pips: 3.0
  use_volatility_filter: true
  min_atr_pct: 0.02
  max_atr_pct: 0.5
  session_only: true
slack:
  enabled: true
  webhook_url: ''
  notify_entry: true
  notify_exit: true
  notify_error: true
  notify_model_degraded: true
  notify_retraining_done: true
  notify_backtest_done: true
